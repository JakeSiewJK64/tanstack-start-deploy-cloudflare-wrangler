on:
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    name: deploy
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: pnpm install
      - name: Build and Deploy
        uses: cloudflare/wrangler-action@v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
